server.port=${PORT:8080}

# Konfigurasi H2 Database File-Based
# Data tersimpan permanen di file ./data/papikostdb
spring.datasource.url=jdbc:h2:file:./data/papikostdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Konfigurasi Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# H2 Console GUI (akses di http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
