# Konfigurasi Port untuk Railway
server.port=${PORT:8080}

# Konfigurasi Database H2
# Menggunakan variabel DB_PATH agar bisa diarahkan ke Volume Railway nanti
spring.datasource.url=jdbc:h2:file:${DB_PATH:./data/papikostdb};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# File Upload Config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
# Menggunakan variabel UPLOAD_DIR agar file tidak hilang
app.upload.dir=${UPLOAD_DIR:./uploads}

